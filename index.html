<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Abonnement</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f5f5;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
            text-align:center;
        }

        h1{
            margin-bottom:25px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>S'abonner</h1>

    <div id="paypal-button-container-P-37B90700FL163270WNGWZFPI"></div>
</div>

<script src="https://www.paypal.com/sdk/js?client-id=Ab3PCMctr1vyDgi8ZfPpaBD5QlmEeAM0bN7M3tLoe1zYFsKAdwWRxkNKe6TnJPteINEO2k0qKp5tdrQw&vault=true&intent=subscription"></script>

<script>
paypal.Buttons({
    style: {
        shape: 'rect',
        color: 'blue',
        layout: 'horizontal',
        label: 'subscribe'
    },

    createSubscription: function(data, actions) {
        return actions.subscription.create({
            plan_id: 'P-37B90700FL163270WNGWZFPI'
        });
    },

    onApprove: function(data, actions) {
        alert("Abonnement activé ! ID : " + data.subscriptionID);
    }

}).render('#paypal-button-container-P-37B90700FL163270WNGWZFPI');
</script>

</body>
</html>
